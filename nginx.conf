server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compressão
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/css application/javascript image/svg+xml application/json text/plain application/xml application/xml+rss;

    # Cabeçalhos de segurança
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Cache longo para assets versionáveis
    location ~* \.(?:css|js|woff2?|ttf|otf|eot|png|jpe?g|webp|gif|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # HTML sempre revalidado (evita "página antiga em cache")
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Páginas de erro amigáveis (fallback para a home)
    error_page 404 /index.html;
}
